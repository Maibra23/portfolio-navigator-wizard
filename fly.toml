# fly.toml — Portfolio Navigator Wizard
# Deploy: fly deploy --remote-only
# First deploy: fly launch --no-deploy (to set app name), then fly deploy
#
# Redis: Using Upstash (external managed Redis with persistence)
#   Set the connection URL as a secret (NOT in [env] for security):
#   fly secrets set REDIS_URL="rediss://default:xxx@xxx.upstash.io:6379"
#
# Other sensitive env vars go in Fly secrets:
#   fly secrets set ADMIN_API_KEY=your-key SMTP_USER=you@gmail.com SMTP_PASSWORD=app-password

app = "portfolio-navigator-wizard"   # change to your actual Fly app name
primary_region = "arn"               # Stockholm — closest to Linnaeus University

[build]
  # Uses the root-level Dockerfile (connects to Upstash Redis)
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT       = "production"
  PORT              = "8080"
  # REDIS_URL is set via fly secrets (Upstash connection string - contains password)
  # ALLOWED_ORIGINS: Add your frontend URL here (comma-separated if multiple)
  ALLOWED_ORIGINS   = "https://portfolio-navigator-frontend.fly.dev,https://portfolio-navigator-wizard.fly.dev"
  # ALLOWED_HOSTS: TrustedHostMiddleware requires exact hostnames (no wildcards)
  ALLOWED_HOSTS     = "portfolio-navigator-wizard.fly.dev,localhost,127.0.0.1"
  # Non-secret env vars — set secrets separately via: fly secrets set KEY=value
  USE_LIVE_DATA                  = "true"
  MANUAL_REGENERATION_REQUIRED   = "false"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false   # Keep always-on (no cold starts for users)
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 50
    hard_limit = 100

  # HTTP health check (recommended for cold-start reliability)
  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/healthz"
    timeout      = "5s"

# Machine size: FastAPI only (no bundled Redis — using Upstash)
# 512mb = minimal (dev); 1gb = recommended production with scipy/numpy/pandas
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
