<!DOCTYPE html>
<html>
<head>
    <title>API Connection Test</title>
</head>
<body>
    <h1>API Connection Test</h1>
    <div id="status">Testing connection...</div>
    <div id="data"></div>

    <script>
        async function testConnection() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/portfolio/ticker-table/data', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                document.getElementById('status').innerHTML = '✅ Connection successful!';
                document.getElementById('data').innerHTML = `
                    <h3>Data received:</h3>
                    <p>Total tickers: ${data.total}</p>
                    <p>First ticker: ${data.tickers[0].ticker} - ${data.tickers[0].companyName}</p>
                    <p>Cache status: ${data.cacheStatus.redis}</p>
                `;
            } catch (error) {
                document.getElementById('status').innerHTML = `❌ Connection failed: ${error.message}`;
                console.error('Error:', error);
            }
        }

        testConnection();
    </script>
</body>
</html>
